<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FNAF World Refreshed Fangame</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

#game{
width:800px;
height:600px;
margin:auto;
position:relative;
border:4px solid #444;
}

canvas{display:block}

#hud{
position:absolute;
bottom:0;
width:100%;
height:60px;
background:#001a33;
display:flex;
justify-content:space-around;
align-items:center;
}

.btn{
background:#003366;
border:2px solid #00aaff;
color:white;
padding:6px 14px;
cursor:pointer;
}

#battleUI{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
}

#commands{
position:absolute;
left:20px;
top:120px;
display:flex;
flex-direction:column;
gap:8px;
}

#hpUI{
position:absolute;
right:20px;
top:20px;
}

.hp{
background:red;
padding:4px;
margin-bottom:6px;
}

.damage{
position:absolute;
color:yellow;
font-weight:bold;
pointer-events:none;
}

#shop{
position:absolute;
top:120px;
left:200px;
width:400px;
background:#111;
border:3px solid magenta;
padding:20px;
display:none;
}

</style>
</head>

<body>

<div id="game">

<canvas id="canvas" width="800" height="600"></canvas>

<div id="battleUI">
<div id="commands"></div>
<div id="hpUI"></div>
</div>

<div id="shop">
<h3>Mendo's Byte Shop</h3>
<button class="btn" onclick="buyByte()">Buy Byte (50)</button>
<br><br>
<button class="btn" onclick="closeShop()">Exit</button>
</div>

<div id="hud">

<div>Tokens: <span id="tokens">0</span></div>
<div>XP: <span id="xp">0</span></div>
<div>Level: <span id="lvl">1</span></div>

<button class="btn" onclick="switchParty()">SWITCH</button>
<button class="btn" onclick="saveGame()">SAVE</button>
<button class="btn" onclick="loadGame()">LOAD</button>

</div>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let keys={}

const world={w:2000,h:2000}

const cam={x:0,y:0}

const player={x:600,y:600,speed:4}

let tokens=0
let xp=0
let level=1

let chips={
attackBoost:false,
defenseBoost:false
}

let bytesOwned=0

const roster=[
{name:"Freddy",col:"#7a4",abilities:["Mic Toss","Pizza Wheel","Heal"]},
{name:"Bonnie",col:"#44a",abilities:["Bash Jam","Guitar Blast","Heal"]},
{name:"Chica",col:"#ee2",abilities:["Cupcake","Pizza","Heal"]},
{name:"Foxy",col:"#a33",abilities:["Hook Slash","Dash","Bite"]},
{name:"Toy Freddy",col:"#854",abilities:["Mic Toss","Pizza Wheel","Party"]},
{name:"Toy Bonnie",col:"#0cf",abilities:["Jam","Blast","Heal"]},
{name:"Mangle",col:"#fff",abilities:["Bite","Static","Hook"]}
]

let unlocked=[0,1,2,3]

let party1=[0,1,2,3]
let party2=[4,5]

let activeParty=party1

let partyHP=[]
let enemyHP=0
let enemyRef=null

let gameState="world"

let enemies=[
{x:800,y:900,hp:60},
{x:1200,y:700,hp:60},
{x:1500,y:1000,hp:80}
]

let bosses=[
{x:1800,y:1800,name:"Auto Chipper",hp:300},
{x:200,y:1800,name:"Security Owl",hp:350}
]

let portals=[
{x:100,y:100}
]

function drawChar(x,y,char){

ctx.fillStyle=char.col
ctx.fillRect(x-15,y-25,30,30)
ctx.fillRect(x-10,y-40,20,15)

ctx.fillStyle="black"
ctx.fillRect(x-5,y-32,4,4)
ctx.fillRect(x+1,y-32,4,4)

}

function drawWorld(){

ctx.fillStyle="#2ecc71"
ctx.fillRect(0,0,800,600)

for(let i=0;i<world.w;i+=100){

for(let j=0;j<world.h;j+=100){

let dx=i-cam.x
let dy=j-cam.y

if(dx>-100 && dx<900 && dy>-100 && dy<700){

ctx.fillStyle="#27ae60"
ctx.fillRect(dx-25,dy-25,50,50)

}

}

}

}

function drawEnemies(){

enemies.forEach(e=>{

let dx=e.x-cam.x
let dy=e.y-cam.y

ctx.fillStyle="#888"
ctx.fillRect(dx-20,dy-20,40,40)

let dist=Math.hypot(player.x-e.x,player.y-e.y)

if(dist<200){

let angle=Math.atan2(player.y-e.y,player.x-e.x)

e.x+=Math.cos(angle)*1
e.y+=Math.sin(angle)*1

}

if(dist<35 && gameState==="world"){

startBattle(e,false)

}

})

}

function drawBosses(){

bosses.forEach(b=>{

let dx=b.x-cam.x
let dy=b.y-cam.y

ctx.fillStyle="purple"
ctx.fillRect(dx-30,dy-30,60,60)

if(Math.abs(player.x-b.x)<40 && Math.abs(player.y-b.y)<40){

startBattle(b,true)

}

})

}

function drawPortals(){

portals.forEach(p=>{

let dx=p.x-cam.x
let dy=p.y-cam.y

ctx.fillStyle="cyan"
ctx.beginPath()
ctx.arc(dx,dy,20,0,Math.PI*2)
ctx.fill()

if(Math.abs(player.x-p.x)<30 && Math.abs(player.y-p.y)<30){

player.x=1600
player.y=300

}

})

}

function update(){

if(gameState!=="world")return

if(keys["KeyW"])player.y-=player.speed
if(keys["KeyS"])player.y+=player.speed
if(keys["KeyA"])player.x-=player.speed
if(keys["KeyD"])player.x+=player.speed

player.x=Math.max(0,Math.min(world.w,player.x))
player.y=Math.max(0,Math.min(world.h,player.y))

cam.x=player.x-400
cam.y=player.y-300

cam.x=Math.max(0,Math.min(world.w-800,cam.x))
cam.y=Math.max(0,Math.min(world.h-600,cam.y))

if(Math.abs(player.x-600)<60 && Math.abs(player.y-600)<60){

document.getElementById("shop").style.display="block"

}

}

function startBattle(enemy,boss){

if(gameState!=="world")return

enemyHP=enemy.hp
enemyRef=enemy

partyHP=activeParty.map(()=>100)

gameState="battle"

document.getElementById("battleUI").style.display="block"

renderCommands()

updateHP()

}

function renderCommands(){

const cmd=document.getElementById("commands")

cmd.innerHTML=""

let abilities=roster[activeParty[0]].abilities

abilities.forEach(a=>{

let b=document.createElement("button")
b.className="btn"
b.innerText=a

b.onclick=()=>useAbility(a)

cmd.appendChild(b)

})

}

function useAbility(a){

let dmg=0

if(a==="Heal"){

partyHP[0]+=20

updateHP()

return

}

if(a==="Pizza Wheel")dmg=15
if(a==="Mic Toss")dmg=12
if(a==="Bite")dmg=18
if(a==="Hook Slash")dmg=16
if(a==="Guitar Blast")dmg=14

if(chips.attackBoost)dmg+=5

enemyHP-=dmg

spawnDamage(520,200,dmg)

if(bytesOwned){

enemyHP-=5

spawnDamage(520,220,5)

}

if(enemyHP<=0){

victory()

return

}

setTimeout(enemyAttack,700)

}

function enemyAttack(){

let target=Math.floor(Math.random()*partyHP.length)

let dmg=10

if(chips.defenseBoost)dmg-=3

partyHP[target]-=dmg

spawnDamage(150,200+(target*70),dmg)

updateHP()

if(partyHP.every(h=>h<=0)){

alert("Party defeated")

endBattle()

}

}

function victory(){

tokens+=20
xp+=30

if(Math.random()<0.3){

let id=Math.floor(Math.random()*roster.length)

if(!unlocked.includes(id)){

unlocked.push(id)

alert("Character unlocked!")

}

}

if(xp>=level*100){

xp=0
level++

}

document.getElementById("tokens").innerText=tokens
document.getElementById("xp").innerText=xp
document.getElementById("lvl").innerText=level

if(enemyRef.name){

bosses=bosses.filter(b=>b!==enemyRef)

}else{

enemies=enemies.filter(e=>e!==enemyRef)

}

endBattle()

}

function updateHP(){

const hp=document.getElementById("hpUI")

hp.innerHTML=""

partyHP.forEach(h=>{

let d=document.createElement("div")
d.className="hp"
d.innerText=Math.max(0,h)

hp.appendChild(d)

})

}

function spawnDamage(x,y,val){

let d=document.createElement("div")

d.className="damage"

d.innerText=val

d.style.left=x+"px"
d.style.top=y+"px"

document.getElementById("game").appendChild(d)

setTimeout(()=>d.remove(),800)

}

function endBattle(){

document.getElementById("battleUI").style.display="none"

gameState="world"

}

function switchParty(){

activeParty=activeParty===party1?party2:party1

}

function buyByte(){

if(tokens>=50){

tokens-=50

bytesOwned++

document.getElementById("tokens").innerText=tokens

}

}

function closeShop(){

document.getElementById("shop").style.display="none"

}

function saveGame(){

let data={tokens,xp,level,unlocked}

localStorage.setItem("fnafSave",JSON.stringify(data))

}

function loadGame(){

let data=JSON.parse(localStorage.getItem("fnafSave"))

if(!data)return

tokens=data.tokens
xp=data.xp
level=data.level
unlocked=data.unlocked

document.getElementById("tokens").innerText=tokens
document.getElementById("xp").innerText=xp
document.getElementById("lvl").innerText=level

}

function loop(){

update()

if(gameState==="world"){

drawWorld()
drawEnemies()
drawBosses()
drawPortals()
drawChar(400,300,roster[activeParty[0]])

}

else if(gameState==="battle"){

ctx.fillStyle="black"
ctx.fillRect(0,0,800,600)

activeParty.forEach((id,i)=>{

drawChar(150,200+(i*80),roster[id])

})

ctx.fillStyle="gray"
ctx.fillRect(600,240,90,90)

}

requestAnimationFrame(loop)

}

window.addEventListener("keydown",e=>keys[e.code]=true)
window.addEventListener("keyup",e=>keys[e.code]=false)

loop()

</script>
</body>
</html>
