<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FNaF World: Canvas Edition</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 800px; height: 600px; margin: 20px auto; border: 4px solid #222; box-shadow: 0 0 30px #04f; background: #000; }
        canvas { display: block; }
        
        /* UI Overlays */
        #top-ui { position: absolute; top: 0; left: 0; width: 100%; height: 50px; background: rgba(0,0,20,0.8); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; border-bottom: 2px solid #08f; z-index: 10; }
        #battle-ui { position: absolute; bottom: 0; left: 0; width: 100%; height: 240px; background: linear-gradient(to bottom, #001, #003); border-top: 4px solid #0cf; display: none; grid-template-columns: 250px 1fr; padding: 15px; box-sizing: border-box; }
        #shop-ui { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); width: 400px; background: #111; border: 3px solid #f0f; padding: 20px; display: none; z-index: 20; text-align: center; }
        
        /* Buttons & Bars */
        .btn { background: #005; color: #0cf; border: 2px solid #0cf; padding: 8px 15px; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn:hover:not(:disabled) { background: #0cf; color: #000; }
        .btn:disabled { border-color: #333; color: #555; cursor: not-allowed; }
        .hp-bar { width: 100%; height: 10px; background: #300; margin-top: 5px; border-radius: 5px; overflow: hidden; }
        .hp-fill { height: 100%; background: #0f0; transition: width 0.3s; }
        #msg { position: absolute; top: 70px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); border: 1px solid #0f0; color: #0f0; padding: 10px 20px; display: none; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="top-ui">
        <div id="token-count">Tokens: 0</div>
        <div>
            <button class="btn" style="padding:2px 10px; font-size:12px;" onclick="saveGame()">SAVE</button>
            <button class="btn" style="padding:2px 10px; font-size:12px;" onclick="loadGame()">LOAD</button>
            <button class="btn" style="padding:2px 10px; font-size:12px;" onclick="toggleShop()">BYTE SHOP</button>
        </div>
    </div>

    <div id="msg"></div>
    <div id="shop-ui">
        <h2 style="color:#f0f; margin-top:0;">Mendo's Byte Shop</h2>
        <p>Upgrade your helper drone!</p>
        <button class="btn" id="buy-byte" onclick="buyByte()">Upgrade Byte (50 Tokens)</button>
        <br><br>
        <button class="btn" onclick="toggleShop()">Close</button>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="battle-ui">
        <div id="party-list"></div>
        <div id="ability-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
    </div>
</div>

<script>
/** * GAME CORE 
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const msgEl = document.getElementById('msg');
let frame = 0, gameState = 'OVERWORLD', tokens = 0, keys = {};

const world = { width: 3000, groundY: 520, camX: 0 };

/**
 * CHARACTER MODELS (Procedural Drawing)
 */
function drawModel(x, y, type, scale=1) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    
    // Body Colors
    const colors = { 
        'Freddy': '#634', 'Bonnie': '#54a', 'Chica': '#eb2', 
        'Foxy': '#a33', 'Endo': '#777', 'Mendo': '#f0f' 
    };
    const c = colors[type] || '#777';

    // Feet
    ctx.fillStyle = c;
    ctx.fillRect(5, 50, 12, 10);
    ctx.fillRect(23, 50, 12, 10);

    // Main Body
    ctx.fillRect(0, 15, 40, 35);
    
    // Head
    ctx.fillRect(5, -10, 30, 25);
    
    // Character Specifics
    ctx.fillStyle = '#000';
    if(type === 'Freddy') { // Top Hat
        ctx.fillRect(10, -20, 20, 12);
        ctx.fillRect(5, -12, 30, 4);
    } else if (type === 'Bonnie') { // Ears
        ctx.fillStyle = c;
        ctx.fillRect(5, -30, 8, 20);
        ctx.fillRect(27, -30, 8, 20);
    } else if (type === 'Chica') { // Beak/Bib
        ctx.fillStyle = '#f90'; ctx.fillRect(12, 5, 16, 8);
        ctx.fillStyle = '#fff'; ctx.fillRect(5, 15, 30, 15);
    } else if (type === 'Foxy') { // Hook & Patch
        ctx.fillStyle = '#333'; ctx.fillRect(10, 0, 8, 8); // Patch
        ctx.fillStyle = '#999'; ctx.fillRect(35, 30, 15, 5); // Hook
    }

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(10, -3, 6, 6);
    ctx.fillRect(24, -3, 6, 6);
    ctx.fillStyle = '#0cf';
    ctx.fillRect(12, -1, 2, 2);
    ctx.fillRect(26, -1, 2, 2);

    ctx.restore();
}

/**
 * CLASSES
 */
class Character {
    constructor(name, hp, atk) {
        this.name = name; this.hp = hp; this.maxHp = hp; this.atk = atk;
        this.lvl = 1; this.xp = 0;
        this.abilities = [
            { name: 'Mic Toss', pwr: 20, cd: 2000, last: 0 },
            { name: 'Pizza Wheel', pwr: 35, cd: 6000, last: 0 },
            { name: 'Happy Jam', pwr: -25, cd: 8000, last: 0 }
        ];
    }
}

class Player {
    constructor() {
        this.x = 200; this.y = 460; this.byteLvl = 0;
        this.party = [new Character('Freddy', 150, 20), new Character('Bonnie', 120, 18), new Character('Chica', 130, 15)];
    }
    update() {
        if (keys['ArrowLeft']) this.x -= 6;
        if (keys['ArrowRight']) this.x += 6;
        this.x = Math.max(0, Math.min(this.x, world.width - 40));
        world.camX = Math.max(0, Math.min(this.x - 380, world.width - 800));
    }
    draw() {
        drawModel(this.x - world.camX, this.y, this.party[0].name);
        // Draw Byte
        if(this.byteLvl > 0) {
            ctx.fillStyle = '#0ff';
            let bx = this.x - world.camX - 30 + Math.cos(frame * 0.1) * 10;
            let by = this.y - 30 + Math.sin(frame * 0.1) * 10;
            ctx.beginPath(); ctx.arc(bx, by, 6, 0, Math.PI*2); ctx.fill();
        }
    }
}

class Enemy {
    constructor(x, name, hp) {
        this.x = x; this.y = 460; this.name = name; this.hp = hp; this.maxHp = hp; this.id = Math.random();
    }
    draw() { drawModel(this.x - world.camX, this.y, 'Endo'); }
}

const player = new Player();
let enemies = [new Enemy(800, 'Endo-01', 100), new Enemy(1600, 'GearHead', 250), new Enemy(2500, 'Auto-Chipper', 600)];
let currentEnemy = null;

/**
 * SYSTEMS
 */
function showMsg(t) { msgEl.innerText = t; msgEl.style.display = 'block'; setTimeout(()=>msgEl.style.display='none', 2000); }

function saveGame() {
    localStorage.setItem('fnaf_save', JSON.stringify({t: tokens, x: player.x, b: player.byteLvl, eCount: enemies.length}));
    showMsg("Adventure Saved!");
}

function loadGame() {
    const data = JSON.parse(localStorage.getItem('fnaf_save'));
    if(!data) return showMsg("No Save Found");
    tokens = data.t; player.x = data.x; player.byteLvl = data.b;
    document.getElementById('token-count').innerText = `Tokens: ${tokens}`;
    showMsg("Loaded Data!");
}

function toggleShop() {
    const ui = document.getElementById('shop-ui');
    ui.style.display = (ui.style.display === 'block') ? 'none' : 'block';
}

function buyByte() {
    if(tokens >= 50) {
        tokens -= 50; player.byteLvl++;
        document.getElementById('token-count').innerText = `Tokens: ${tokens}`;
        showMsg("Byte Upgraded!");
    } else showMsg("Not enough tokens!");
}

function startBattle(e) {
    gameState = 'BATTLE'; currentEnemy = e;
    document.getElementById('battle-ui').style.display = 'grid';
    updateBattleUI();
}

function updateBattleUI() {
    const pList = document.getElementById('party-list');
    pList.innerHTML = '';
    player.party.forEach(p => {
        pList.innerHTML += `<div>${p.name} <div class="hp-bar"><div class="hp-fill" style="width:${(p.hp/p.maxHp)*100}%"></div></div></div>`;
    });

    const aGrid = document.getElementById('ability-grid');
    aGrid.innerHTML = '';
    player.party[0].abilities.forEach((a, i) => {
        const btn = document.createElement('button');
        btn.className = 'btn'; btn.innerText = a.name;
        const now = Date.now();
        if(now - a.last < a.cd) {
            btn.disabled = true;
            setTimeout(updateBattleUI, a.cd - (now - a.last));
        }
        btn.onclick = () => useAbility(a);
        aGrid.appendChild(btn);
    });
}

function useAbility(a) {
    a.last = Date.now();
    let dmg = a.pwr + (player.byteLvl * 10);
    if(a.pwr > 0) {
        currentEnemy.hp -= dmg;
        showMsg(`${a.name} hits for ${dmg}!`);
    } else {
        player.party.forEach(p => p.hp = Math.min(p.maxHp, p.hp + Math.abs(a.pwr)));
        showMsg("Party Healed!");
    }
    
    if(currentEnemy.hp <= 0) endBattle(true);
    else setTimeout(enemyTurn, 800);
    updateBattleUI();
}

function enemyTurn() {
    if(gameState !== 'BATTLE') return;
    const target = player.party[Math.floor(Math.random()*3)];
    target.hp -= 15;
    if(player.party.every(p => p.hp <= 0)) endBattle(false);
    updateBattleUI();
}

function endBattle(win) {
    gameState = 'OVERWORLD';
    document.getElementById('battle-ui').style.display = 'none';
    if(win) {
        tokens += 40;
        enemies = enemies.filter(e => e.id !== currentEnemy.id);
        document.getElementById('token-count').innerText = `Tokens: ${tokens}`;
        showMsg("Victory! +40 Tokens");
    } else {
        player.x = 200; player.party.forEach(p => p.hp = p.maxHp);
        showMsg("Defeat... Returning to start.");
    }
}

/**
 * GAME LOOP
 */
function loop() {
    ctx.clearRect(0,0,800,600);
    
    if(gameState === 'OVERWORLD') {
        // Background
        ctx.fillStyle = '#020'; ctx.fillRect(0, 0, 800, 600);
        ctx.fillStyle = '#141'; ctx.fillRect(0, world.groundY, 800, 100);
        
        player.update();
        player.draw();
        
        enemies.forEach(e => {
            e.draw();
            if(Math.abs(player.x - e.x) < 40) startBattle(e);
        });
    } else {
        // Battle Scene
        ctx.fillStyle = '#001'; ctx.fillRect(0,0,800,600);
        // Draw Large Enemy
        drawModel(550, 200, 'Endo', 2.5);
        ctx.fillStyle = '#fff'; ctx.fillText(`${currentEnemy.name} HP: ${currentEnemy.hp}`, 550, 380);
        // Draw Party
        player.party.forEach((p, i) => drawModel(150, 50 + (i*100), p.name, 1.2));
    }
    
    frame++;
    requestAnimationFrame(loop);
}

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
loop();
</script>
</body>
</html>
