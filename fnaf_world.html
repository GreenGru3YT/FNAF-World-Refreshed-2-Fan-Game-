<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FNaF World - Adventure Mode</title>
    <style>
        :root { --fnaf-blue: #00aaff; --fnaf-green: #2ecc71; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial', sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 800px; height: 600px; margin: 10px auto; border: 4px solid #444; background: #000; }
        canvas { display: block; }

        /* UI HUD */
        #hud { position: absolute; bottom: 0; width: 100%; height: 60px; background: rgba(0,0,50,0.9); border-top: 3px solid var(--fnaf-blue); display: flex; justify-content: space-around; align-items: center; z-index: 10; }
        .btn { background: #003366; color: #fff; border: 2px solid var(--fnaf-blue); padding: 5px 15px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn:hover { background: var(--fnaf-blue); color: #000; }

        /* Mendo's Byte Shop */
        #shop-ui { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); width: 400px; background: #111; border: 3px solid #f0f; padding: 20px; display: none; z-index: 100; text-align: center; }
        
        /* Battle UI Overlay */
        #battle-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 50; }
        #battle-commands { position: absolute; top: 20px; left: 250px; display: flex; flex-direction: column; gap: 10px; }
        #enemy-name { position: absolute; top: 20px; left: 20px; font-size: 24px; color: #fff; }
        #team-hp { position: absolute; top: 20px; right: 20px; text-align: right; }
        .hp-val { background: #f00; border: 1px solid #fff; padding: 2px 10px; margin-bottom: 5px; font-weight: bold; width: 80px; display: inline-block; text-align: right;}
        
        /* Transition Flash */
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; pointer-events: none; z-index: 999; transition: opacity 0.1s; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="flash"></div>
    <div id="hud">
        <button class="btn">PARTY</button>
        <button class="btn">CHIPS</button>
        <button class="btn" onclick="openShop()">BYTES</button>
        <button class="btn" onclick="saveGame()">SAVE</button>
        <div style="color:var(--fnaf-blue)">Tokens: <span id="token-count">100</span></div>
    </div>

    <div id="shop-ui">
        <h2 style="color:#f0f">Mendo's Endoskeleton Shop</h2>
        <p>Buy a Byte to help in battle!</p>
        <button class="btn" onclick="buyByte(50)">Med-Pod (50 Tokens)</button><br><br>
        <button class="btn" onclick="closeShop()">Exit Shop</button>
    </div>

    <div id="battle-ui">
        <div id="enemy-name">Auto-Chipper</div>
        <div id="battle-commands"></div>
        <div id="team-hp"></div>
        <button class="btn" onclick="endBattle()" style="position: absolute; bottom: 80px; left: 20px;">Run Away (Debug)</button>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

<script>
/** ENGINE CONFIG **/
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let tokens = 100;
let bytesOwned = 0;
let gameState = 'OVERWORLD';
let keys = {};

// Camera and World
const world = { width: 2000, height: 2000 };
const cam = { x: 0, y: 0 };
const player = { x: 400, y: 300, speed: 4 };

/** RENDERING **/
function drawMap() {
    ctx.fillStyle = '#1a472a';
    ctx.fillRect(0, 0, 800, 600);

    ctx.fillStyle = '#2ecc71';
    for(let i=0; i<2000; i+=100) {
        for(let j=0; j<2000; j+=100) {
            let dx = i - cam.x;
            let dy = j - cam.y;
            if(dx > -50 && dx < 850 && dy > -50 && dy < 650) {
                ctx.beginPath();
                ctx.arc(dx, dy, 25, 0, Math.PI*2);
                ctx.fill();
            }
        }
    }

    // Mendo's House
    ctx.fillStyle = '#444';
    ctx.fillRect(600 - cam.x, 400 - cam.y, 100, 80);
    ctx.fillStyle = '#f0f';
    ctx.font = "bold 16px Arial";
    ctx.fillText("MENDO", 620 - cam.x, 390 - cam.y);
}

function drawPlayer() {
    ctx.fillStyle = '#634'; 
    ctx.fillRect(400-15, 300-15, 30, 30);
    ctx.fillStyle = '#000';
    ctx.fillRect(400-8, 300-25, 16, 10);
}

/** GAME LOGIC **/
function update() {
    if(gameState !== 'OVERWORLD') return;

    if(keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed;
    if(keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;
    if(keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
    if(keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;

    cam.x = player.x - 400;
    cam.y = player.y - 300;

    // Check Shop Trigger
    if(Math.abs(player.x - 650) < 50 && Math.abs(player.y - 440) < 50) {
        openShop();
    }
    
    // Random Encounter Chance (0.2% per frame while moving)
    if((keys['ArrowUp'] || keys['ArrowDown'] || keys['ArrowLeft'] || keys['ArrowRight']) && Math.random() < 0.002) {
        triggerEncounter();
    }
}

function openShop() {
    document.getElementById('shop-ui').style.display = 'block';
    gameState = 'SHOP';
}

function closeShop() {
    document.getElementById('shop-ui').style.display = 'none';
    gameState = 'OVERWORLD';
    // THE FIX: Bounce the player down so they aren't stuck in the trigger!
    player.y += 60; 
}

function buyByte(cost) {
    if(tokens >= cost) {
        tokens -= cost;
        bytesOwned++;
        document.getElementById('token-count').innerText = tokens;
        alert("Byte Purchased! It will help you in battles.");
    } else {
        alert("Not enough tokens!");
    }
}

function triggerEncounter() {
    gameState = 'TRANSITION';
    const flash = document.getElementById('flash');
    
    // Flashing effect to mimic FNaF World encounter transition
    let flashes = 0;
    let flashInterval = setInterval(() => {
        flash.style.opacity = flash.style.opacity == '1' ? '0' : '1';
        flashes++;
        if(flashes > 5) {
            clearInterval(flashInterval);
            flash.style.opacity = '0';
            startBattle();
        }
    }, 100);
}

function startBattle() {
    gameState = 'BATTLE';
    const bUI = document.getElementById('battle-ui');
    bUI.style.display = 'block';
    
    const moves = ["Mic Toss", "Pizza Wheel", "Birthday"];
    const cmd = document.getElementById('battle-commands');
    cmd.innerHTML = '';
    moves.forEach(m => {
        const b = document.createElement('button');
        b.className = 'btn';
        b.style.marginBottom = '10px';
        b.innerText = m;
        b.onclick = () => alert("Used " + m + "!");
        cmd.appendChild(b);
    });

    const sw = document.createElement('button');
    sw.className = 'btn';
    sw.style.marginTop = '20px';
    sw.innerText = "SWITCH";
    cmd.appendChild(sw);

    const hpDiv = document.getElementById('team-hp');
    hpDiv.innerHTML = `
        <div class="hp-val">110</div><br>
        <div class="hp-val">115</div><br>
        <div class="hp-val">79</div><br>
        <div class="hp-val">125</div>
    `;
}

function endBattle() {
    document.getElementById('battle-ui').style.display = 'none';
    gameState = 'OVERWORLD';
}

function gameLoop() {
    update();
    
    if(gameState === 'OVERWORLD' || gameState === 'TRANSITION') {
        drawMap();
        drawPlayer();
    } else if (gameState === 'BATTLE') {
        // Simple Battle Background
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, 800, 600);
        ctx.fillStyle = '#fff';
        ctx.font = "20px Arial";
        ctx.fillText("Battle rendering goes here...", 250, 300);
    }
    
    requestAnimationFrame(gameLoop);
}

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

gameLoop();
</script>
</body>
</html>
