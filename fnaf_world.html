<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazbear RPG: Advanced Edition</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 800px; height: 600px; margin: 10px auto; border: 4px solid #333; box-shadow: 0 0 20px #00f; }
        canvas { display: block; background: radial-gradient(circle, #222 0%, #000 100%); }
        
        /* Top Bar */
        #top-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 40px;
            background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; z-index: 5;
        }
        .btn-small { background: #444; color: #fff; border: 1px solid #777; padding: 2px 10px; cursor: pointer; font-size: 12px; }
        .btn-small:hover { background: #666; }

        /* Battle UI */
        #battle-ui {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 220px;
            background: linear-gradient(to bottom, #000033, #000011); border-top: 3px solid #0af;
            display: none; grid-template-columns: 1fr 2fr; padding: 15px; box-sizing: border-box;
        }
        .party-list { display: flex; flex-direction: column; gap: 8px; }
        .character-status { padding: 8px; background: rgba(255,255,255,0.05); border-left: 4px solid #0af; font-size: 13px; }
        .hp-bar-bg { width: 100%; height: 8px; background: #300; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .hp-bar-fill { height: 100%; background: #0f0; transition: width 0.3s; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .ability-btn { 
            background: #111; color: #0af; border: 2px solid #0af; cursor: pointer; 
            font-size: 14px; font-weight: bold; position: relative; overflow: hidden;
        }
        .ability-btn:disabled { border-color: #333; color: #444; cursor: not-allowed; }
        .cooldown-overlay { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0, 170, 255, 0.3); height: 0%; transition: height 0.1s linear; }

        #message-box {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); color: #0f0; padding: 10px 30px; border: 1px solid #0f0;
            display: none; z-index: 10; font-family: monospace;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="top-ui">
        <div id="currency-display">Tokens: 0</div>
        <div>
            <button class="btn-small" onclick="saveGame()">SAVE GAME</button>
            <button class="btn-small" onclick="loadGame()">LOAD GAME</button>
        </div>
    </div>

    <div id="message-box"></div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="battle-ui">
        <div class="party-list" id="party-stats"></div>
        <div class="controls" id="action-buttons"></div>
    </div>
</div>

<script>
/** * GAME STATE & CONSTANTS
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('battle-ui');
const partyStatsDiv = document.getElementById('party-stats');
const actionButtonsDiv = document.getElementById('action-buttons');
const msgBox = document.getElementById('message-box');

let gameState = 'OVERWORLD';
let keys = {};
let frame = 0;
let tokens = 0;

const world = { width: 4000, height: 600, groundY: 520, cameraX: 0 };

/**
 * ENTITY CLASSES
 */
class Character {
    constructor(name, color, atk, maxHp) {
        this.name = name;
        this.color = color;
        this.atk = atk;
        this.hp = maxHp;
        this.maxHp = maxHp;
        this.level = 1;
        this.xp = 0;
        this.abilities = [
            { name: 'Bash', dmg: 15, cd: 2000, lastUsed: 0 },
            { name: 'Pizza Party', dmg: 25, cd: 5000, lastUsed: 0 },
            { name: 'Regen', dmg: -20, cd: 8000, lastUsed: 0 }
        ];
    }
}

class PlayerEntity {
    constructor() {
        this.x = 100;
        this.y = 460;
        this.w = 40;
        this.h = 60;
        this.vx = 0;
        this.party = [
            new Character('Freddy', '#0af', 15, 120),
            new Character('Bonnie', '#a0f', 12, 100),
            new Character('Chica', '#ff0', 10, 110)
        ];
        this.byteLevel = 1; // Passive damage helper
    }

    update() {
        if (keys['ArrowLeft']) this.vx = -6;
        else if (keys['ArrowRight']) this.vx = 6;
        else this.vx = 0;

        this.x += this.vx;
        if (this.x < 0) this.x = 0;
        if (this.x > world.width - this.w) this.x = world.width - this.w;

        world.cameraX = Math.max(0, Math.min(this.x - 380, world.width - 800));
    }

    draw() {
        ctx.fillStyle = this.party[0].color;
        let b = Math.sin(frame * 0.15) * 6;
        ctx.fillRect(this.x - world.cameraX, this.y + b, this.w, this.h);
        
        // Byte (Floating Helper)
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(this.x - world.cameraX - 20, this.y + b - 20, 5, 0, Math.PI*2);
        ctx.fill();
    }
}

class Enemy {
    constructor(x, name, color, hp) {
        this.x = x;
        this.y = 460;
        this.w = 40;
        this.h = 60;
        this.name = name;
        this.color = color;
        this.hp = hp;
        this.maxHp = hp;
        this.id = Math.random();
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x - world.cameraX, this.y, this.w, this.h);
        ctx.fillStyle = 'white';
        ctx.fillText(this.name, this.x - world.cameraX, this.y - 10);
    }
}

let player = new PlayerEntity();
let enemies = [
    new Enemy(800, 'Endo', '#f55', 100),
    new Enemy(1600, 'Gearrat', '#f55', 200),
    new Enemy(2400, 'Brow Boy', '#f55', 400)
];
let currentEnemy = null;

/**
 * SAVE & LOAD LOGIC
 */
function saveGame() {
    const saveData = {
        tokens: tokens,
        level: player.party[0].level,
        xp: player.party[0].xp,
        enemyCount: enemies.length,
        posX: player.x
    };
    localStorage.setItem('fnaf_world_save', JSON.stringify(saveData));
    showMessage("Game Saved to LocalStorage!");
}

function loadGame() {
    const raw = localStorage.getItem('fnaf_world_save');
    if (!raw) return showMessage("No save data found!");
    
    const data = JSON.parse(raw);
    tokens = data.tokens;
    player.x = data.posX;
    player.party.forEach(p => {
        p.level = data.level;
        p.xp = data.xp;
    });
    // Refresh currency display
    document.getElementById('currency-display').innerText = `Tokens: ${tokens}`;
    showMessage("Game Loaded!");
}

/**
 * BATTLE SYSTEM
 */
function showMessage(txt) {
    msgBox.innerText = txt;
    msgBox.style.display = 'block';
    setTimeout(() => msgBox.style.display = 'none', 2500);
}

function startBattle(enemy) {
    gameState = 'BATTLE';
    currentEnemy = enemy;
    ui.style.display = 'grid';
    updateBattleUI();
}

function updateBattleUI() {
    partyStatsDiv.innerHTML = '';
    player.party.forEach(p => {
        const hpPct = (p.hp / p.maxHp) * 100;
        partyStatsDiv.innerHTML += `
            <div class="character-status">
                ${p.name} - Lvl ${p.level}
                <div class="hp-bar-bg"><div class="hp-bar-fill" style="width:${hpPct}%"></div></div>
            </div>
        `;
    });

    actionButtonsDiv.innerHTML = '';
    player.party[0].abilities.forEach((abi, index) => {
        const btn = document.createElement('button');
        btn.className = 'ability-btn';
        btn.innerHTML = `${abi.name}<div class="cooldown-overlay" id="cd-${index}"></div>`;
        
        const now = Date.now();
        const timePassed = now - abi.lastUsed;
        if (timePassed < abi.cd) {
            btn.disabled = true;
            setTimeout(updateBattleUI, abi.cd - timePassed);
        }

        btn.onclick = () => useAbility(abi, index);
        actionButtonsDiv.appendChild(btn);
    });
}

function useAbility(abi, index) {
    abi.lastUsed = Date.now();
    
    // Byte Attack (Passive Bonus)
    const byteDmg = player.byteLevel * 5;
    
    if (abi.dmg > 0) {
        const totalDmg = abi.dmg + byteDmg;
        currentEnemy.hp -= totalDmg;
        showMessage(`${abi.name} hits for ${totalDmg}! (Byte +${byteDmg})`);
    } else {
        player.party.forEach(p => p.hp = Math.min(p.maxHp, p.hp + Math.abs(abi.dmg)));
        showMessage(`Party healed for ${Math.abs(abi.dmg)}!`);
    }

    if (currentEnemy.hp <= 0) {
        endBattle(true);
    } else {
        setTimeout(enemyAction, 800);
    }
    updateBattleUI();
}

function enemyAction() {
    if (gameState !== 'BATTLE') return;
    const target = player.party[Math.floor(Math.random() * player.party.length)];
    const dmg = 10 + (player.party[0].level * 2);
    target.hp -= dmg;
    if (target.hp < 0) target.hp = 0;
    updateBattleUI();
    
    if (player.party.every(p => p.hp <= 0)) endBattle(false);
}

function endBattle(win) {
    if (win) {
        tokens += 50;
        player.party.forEach(p => p.xp += 40);
        enemies = enemies.filter(e => e.id !== currentEnemy.id);
        showMessage("Victory! +50 Tokens");
    } else {
        showMessage("Game Over! Party Fainted.");
        player.x = 100; // Reset position
        player.party.forEach(p => p.hp = p.maxHp);
    }
    
    document.getElementById('currency-display').innerText = `Tokens: ${tokens}`;
    gameState = 'OVERWORLD';
    ui.style.display = 'none';
}

/**
 * CORE LOOP
 */
function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (gameState === 'OVERWORLD') {
        // Ground
        ctx.fillStyle = '#113311';
        ctx.fillRect(0, world.groundY, canvas.width, 100);
        
        player.update();
        player.draw();

        enemies.forEach(en => {
            en.draw();
            if (Math.abs(player.x - en.x) < 40) startBattle(en);
        });

        // Instructions
        ctx.fillStyle = "#555";
        ctx.fillText("Use Arrow Keys to Move. Walk into enemies to battle.", 20, 580);

    } else if (gameState === 'BATTLE') {
        // Draw Enemy
        ctx.fillStyle = currentEnemy.color;
        ctx.fillRect(500, 150, 150, 150);
        ctx.fillStyle = 'white';
        ctx.font = "20px monospace";
        ctx.fillText(currentEnemy.name, 500, 130);
        ctx.fillText(`HP: ${currentEnemy.hp}/${currentEnemy.maxHp}`, 500, 330);

        // Draw Party Sprites
        player.party.forEach((p, i) => {
            ctx.fillStyle = p.color;
            ctx.fillRect(100, 80 + (i * 90), 40, 60);
        });
    }

    frame++;
    requestAnimationFrame(loop);
}

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

loop();
</script>
</body>
</html>
