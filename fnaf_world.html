<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FNAF World Refreshed</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial;
overflow:hidden;
}

#game{
width:800px;
height:600px;
margin:auto;
position:relative;
border:4px solid #444;
}

canvas{display:block}

#hud{
position:absolute;
bottom:0;
width:100%;
height:60px;
background:#001a33;
display:flex;
align-items:center;
justify-content:space-around;
}

.btn{
background:#003366;
border:2px solid #00aaff;
color:white;
padding:6px 14px;
cursor:pointer;
}

#battleUI{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
background:black;
}

#commands{
position:absolute;
left:20px;
top:80px;
display:flex;
flex-direction:column;
gap:8px;
}

#hpUI{
position:absolute;
right:20px;
top:20px;
text-align:right;
}

.hp{
background:red;
padding:3px 8px;
margin-bottom:6px;
}

.damage{
position:absolute;
color:#ff0;
font-weight:bold;
pointer-events:none;
}
</style>
</head>

<body>

<div id="game">

<canvas id="canvas" width="800" height="600"></canvas>

<div id="battleUI">
<div id="commands"></div>
<div id="hpUI"></div>
</div>

<div id="hud">
<div>Tokens: <span id="tokens">0</span></div>
<button class="btn" onclick="switchParty()">SWITCH</button>
</div>

</div>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

let keys={}

let tokens=0
let xp=0
let level=1

const world={w:2000,h:2000}

const cam={x:0,y:0}

const player={
x:500,
y:500,
speed:4
}

const roster=[
{name:"Freddy",col:"#6b3"},
{name:"Bonnie",col:"#44a"},
{name:"Chica",col:"#ee2"},
{name:"Foxy",col:"#a33"},
{name:"Toy Freddy",col:"#852"},
{name:"Toy Bonnie",col:"#0cf"},
{name:"Mangle",col:"#eee"}
]

let party1=[0,1,2,3]
let party2=[4,5,6]

let activeParty=party1

let partyHP=[]
let enemyHP=0

let bytesOwned=1

let enemies=[
{x:800,y:900,hp:60},
{x:1200,y:700,hp:60},
{x:1500,y:1100,hp:80}
]

let gameState="world"

function drawChar(x,y,char){

ctx.fillStyle=char.col
ctx.fillRect(x-15,y-25,30,30)
ctx.fillRect(x-10,y-40,20,15)

ctx.fillStyle="#000"
ctx.fillRect(x-6,y-33,4,4)
ctx.fillRect(x+2,y-33,4,4)

}

function drawWorld(){

ctx.fillStyle="#2ecc71"
ctx.fillRect(0,0,800,600)

for(let i=0;i<world.w;i+=100){

for(let j=0;j<world.h;j+=100){

let dx=i-cam.x
let dy=j-cam.y

if(dx>-100 && dx<900 && dy>-100 && dy<700){

ctx.fillStyle="#27ae60"
ctx.fillRect(dx-25,dy-25,50,50)

}

}

}

}

function drawEnemies(){

enemies.forEach(e=>{

let dx=e.x-cam.x
let dy=e.y-cam.y

ctx.fillStyle="#888"
ctx.fillRect(dx-20,dy-20,40,40)

if(Math.abs(player.x-e.x)<35 && Math.abs(player.y-e.y)<35){

startBattle(e)

}

})

}

function drawPlayer(){

drawChar(400,300,roster[activeParty[0]])

}

function update(){

if(gameState!=="world")return

if(keys["KeyW"])player.y-=player.speed
if(keys["KeyS"])player.y+=player.speed
if(keys["KeyA"])player.x-=player.speed
if(keys["KeyD"])player.x+=player.speed

player.x=Math.max(0,Math.min(world.w,player.x))
player.y=Math.max(0,Math.min(world.h,player.y))

cam.x=player.x-400
cam.y=player.y-300

}

function startBattle(enemy){

gameState="battle"

enemyHP=enemy.hp

partyHP=activeParty.map(()=>100)

document.getElementById("battleUI").style.display="block"

renderBattle(enemy)

}

function renderBattle(enemy){

const cmd=document.getElementById("commands")
cmd.innerHTML=""

const moves=["Mic Toss","Pizza Wheel","Bite"]

moves.forEach(m=>{

const b=document.createElement("button")
b.className="btn"
b.innerText=m

b.onclick=()=>attack(enemy)

cmd.appendChild(b)

})

updateHP()

}

function attack(enemy){

let dmg=10+Math.random()*10

enemyHP-=dmg

spawnDamage(500,200,Math.floor(dmg))

if(bytesOwned){

let byteDmg=5

enemyHP-=byteDmg

spawnDamage(500,220,byteDmg)

}

if(enemyHP<=0){

victory(enemy)

return

}

enemyAttack()

}

function enemyAttack(){

let target=Math.floor(Math.random()*partyHP.length)

let dmg=8+Math.random()*8

partyHP[target]-=dmg

spawnDamage(150,200+(target*70),Math.floor(dmg))

updateHP()

}

function victory(enemy){

tokens+=10
xp+=20

document.getElementById("tokens").innerText=tokens

if(xp>=level*100){

xp=0
level++

}

enemies=enemies.filter(e=>e!==enemy)

endBattle()

}

function updateHP(){

const hpUI=document.getElementById("hpUI")
hpUI.innerHTML=""

partyHP.forEach(h=>{

let div=document.createElement("div")
div.className="hp"
div.innerText=Math.max(0,Math.floor(h))

hpUI.appendChild(div)

})

}

function spawnDamage(x,y,val){

let d=document.createElement("div")
d.className="damage"
d.innerText=val
d.style.left=x+"px"
d.style.top=y+"px"

document.body.appendChild(d)

setTimeout(()=>d.remove(),800)

}

function endBattle(){

document.getElementById("battleUI").style.display="none"

gameState="world"

}

function switchParty(){

activeParty = activeParty===party1 ? party2 : party1

}

function loop(){

update()

if(gameState==="world"){

drawWorld()

drawEnemies()

drawPlayer()

}

else if(gameState==="battle"){

ctx.fillStyle="#000"
ctx.fillRect(0,0,800,600)

activeParty.forEach((id,i)=>{

drawChar(150,200+(i*80),roster[id])

})

ctx.fillStyle="#aaa"
ctx.fillRect(600,250,80,80)

}

requestAnimationFrame(loop)

}

window.addEventListener("keydown",e=>keys[e.code]=true)
window.addEventListener("keyup",e=>keys[e.code]=false)

loop()

</script>
</body>
</html>
