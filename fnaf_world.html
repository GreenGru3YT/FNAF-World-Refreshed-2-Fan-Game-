<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNaF World - GitHub Adventure</title>
    <style>
        :root { --main-blue: #00ccff; --dark-bg: #050505; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #game-wrapper { position: relative; width: 800px; height: 600px; margin: 10px auto; border: 4px solid #333; }
        canvas { display: block; background: #000; }

        /* UI Layers */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .ui-panel { pointer-events: auto; background: rgba(0,0,0,0.9); border: 2px solid var(--main-blue); padding: 15px; }
        
        #hud { position: absolute; top: 0; width: 100%; height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; background: rgba(0,0,20,0.8); border-bottom: 2px solid var(--main-blue); }
        
        #party-menu { display: none; flex-direction: column; z-index: 100; box-sizing: border-box; }
        .roster-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; overflow-y: auto; margin: 10px 0; max-height: 400px; }
        .char-slot { border: 1px solid #444; padding: 5px; text-align: center; cursor: pointer; font-size: 10px; transition: 0.2s; }
        .char-slot.locked { opacity: 0.2; cursor: default; }
        .char-slot.active { border-color: #0f0; background: rgba(0,255,0,0.1); }
        .char-slot:hover:not(.locked) { background: #111; border-color: var(--main-blue); }

        #battle-ui { position: absolute; bottom: 0; width: 100%; height: 220px; background: linear-gradient(to bottom, #001, #003); border-top: 4px solid var(--main-blue); display: none; grid-template-columns: 250px 1fr; z-index: 50; padding: 10px; box-sizing: border-box; }
        
        .btn { background: #002244; color: var(--main-blue); border: 2px solid var(--main-blue); padding: 8px 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn:hover { background: var(--main-blue); color: #000; }
        
        #msg-box { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); width: 400px; text-align: center; font-size: 20px; color: #0f0; background: rgba(0,0,0,0.8); padding: 20px; display: none; z-index: 200; border: 1px solid #0f0; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="hud">
        <div>Tokens: <span id="token-val">0</span></div>
        <div>
            <button class="btn" onclick="saveGame()">Save</button>
            <button class="btn" onclick="toggleParty()">Party</button>
        </div>
    </div>

    <div id="msg-box"></div>

    <div id="party-menu" class="overlay" style="padding: 60px;">
        <div class="ui-panel">
            <h2 style="margin:0; color: var(--main-blue);">Party Selection</h2>
            <p>Select up to 4 characters for your active team.</p>
            <div id="roster-container" class="roster-grid"></div>
            <button class="btn" onclick="toggleParty()">Ready to Adventure</button>
        </div>
    </div>

    <div id="battle-ui">
        <div id="team-stats" style="display: flex; flex-direction: column; gap: 10px;"></div>
        <div id="battle-actions" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px;"></div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

<script>
/** * CHARACTER DATA & RENDERING 
 * Every character has specific DNA for the procedural renderer
 */
const ROSTER = [
    { name: "Freddy", col: "#634", type: "bear", eyes: "#0cf", feat: "hat" },
    { name: "Bonnie", col: "#54a", type: "bunny", eyes: "#f00", feat: "ears" },
    { name: "Chica", col: "#eb2", type: "bird", eyes: "#f0f", feat: "bib" },
    { name: "Foxy", col: "#a33", type: "fox", eyes: "#ff0", feat: "patch" },
    { name: "Toy Freddy", col: "#853", type: "bear", eyes: "#0cf", feat: "hat" },
    { name: "Toy Bonnie", col: "#0cf", type: "bunny", eyes: "#0f0", feat: "ears" },
    { name: "Toy Chica", col: "#ff0", type: "bird", eyes: "#0cf", feat: "bib" },
    { name: "Mangle", col: "#eee", type: "fox", eyes: "#ff0", feat: "patch" },
    { name: "BB", col: "#f44", type: "human", eyes: "#0cf", feat: "prop" },
    { name: "JJ", col: "#f4a", type: "human", eyes: "#f0f", feat: "prop" },
    { name: "Phantom Freddy", col: "#452", type: "bear", eyes: "#fff", feat: "hat", ghost: true },
    { name: "Springtrap", col: "#774", type: "bunny", eyes: "#999", feat: "ears", withered: true },
    { name: "Puppet", col: "#111", type: "human", eyes: "#fff", feat: "face" },
    { name: "Nightmare", col: "#111", type: "bear", eyes: "#f00", feat: "hat", sharp: true },
    { name: "Crying Child", col: "#222", type: "human", eyes: "#fff", feat: "tears" },
    { name: "Fredbear", col: "#fb2", type: "bear", eyes: "#0cf", feat: "hat" }
];

// Filling the rest with generic slots for the 48-char grid
for(let i=ROSTER.length; i<48; i++) {
    ROSTER.push({ name: "Slot "+(i+1), col: "#222", type: "bear", eyes: "#555", feat: "none" });
}

/** ENGINE STATE */
let state = {
    tokens: 0,
    unlocked: [0, 1, 2, 3], // Freddy, Bonnie, Chica, Foxy
    party: [0, 1, 2, 3],
    inGlitch: false,
    view: 'OVERWORLD',
    playerPos: { x: 100, y: 460 },
    currentEnemy: null,
    challenger: null,
    keys: {}
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

/** * PROCEDURAL DRAWER 
 */
function drawAnimatronic(x, y, char, scale = 1) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    
    if (char.ghost) ctx.globalAlpha = 0.5;

    // Body & Head
    ctx.fillStyle = char.col;
    ctx.fillRect(0, 15, 40, 35); 
    ctx.fillRect(5, -10, 30, 25);
    
    // Feature Logic
    ctx.fillStyle = "#000";
    if (char.feat === "hat") { ctx.fillRect(10, -20, 20, 12); ctx.fillRect(5, -12, 30, 4); }
    if (char.feat === "ears") { ctx.fillStyle = char.col; ctx.fillRect(5, -30, 8, 20); ctx.fillRect(27, -30, 8, 20); }
    if (char.feat === "patch") { ctx.fillStyle = "#111"; ctx.fillRect(10, -2, 8, 8); }
    if (char.feat === "tears") { ctx.fillStyle = "#0af"; ctx.fillRect(10, 5, 2, 10); ctx.fillRect(28, 5, 2, 10); }

    // Eyes
    ctx.fillStyle = "#fff"; ctx.fillRect(10, -3, 6, 6); ctx.fillRect(24, -3, 6, 6);
    ctx.fillStyle = char.eyes; ctx.fillRect(12, -1, 2, 2); ctx.fillRect(26, -1, 2, 2);

    ctx.restore();
}

/** * GAME SYSTEMS 
 */
function showMsg(txt, time = 2500) {
    const b = document.getElementById('msg-box');
    b.innerText = txt; b.style.display = 'block';
    setTimeout(() => b.style.display = 'none', time);
}

function saveGame() {
    localStorage.setItem('fnaf_world_gh', JSON.stringify(state));
    showMsg("Adventure Log Saved!");
}

function toggleParty() {
    const menu = document.getElementById('party-menu');
    if (state.view === 'PARTY') {
        state.view = 'OVERWORLD';
        menu.style.display = 'none';
    } else {
        state.view = 'PARTY';
        menu.style.display = 'flex';
        renderRoster();
    }
}

function renderRoster() {
    const container = document.getElementById('roster-container');
    container.innerHTML = '';
    ROSTER.forEach((c, i) => {
        const isUnlocked = state.unlocked.includes(i);
        const isActive = state.party.includes(i);
        const div = document.createElement('div');
        div.className = `char-slot ${isUnlocked ? '' : 'locked'} ${isActive ? 'active' : ''}`;
        div.innerHTML = `<div style="font-weight:bold">${c.name}</div>`;
        div.onclick = () => {
            if (!isUnlocked) return;
            if (state.party.includes(i)) {
                state.party = state.party.filter(id => id !== i);
            } else if (state.party.length < 4) {
                state.party.push(i);
            }
            renderRoster();
        };
        container.appendChild(div);
    });
}

/** * BATTLE ENGINE 
 */
function startBattle(enemy, isChallenger = false) {
    state.view = 'BATTLE';
    state.currentEnemy = enemy;
    state.challenger = isChallenger ? enemy : null;
    state.battleParty = state.party.map(id => ({ ...ROSTER[id], hp: 100, maxHp: 100 }));
    
    document.getElementById('battle-ui').style.display = 'grid';
    updateBattleUI();
}

function updateBattleUI() {
    const stats = document.getElementById('team-stats');
    stats.innerHTML = '';
    state.battleParty.forEach(p => {
        stats.innerHTML += `<div>${p.name} [HP: ${p.hp}/100]</div>`;
    });

    const actions = document.getElementById('battle-actions');
    actions.innerHTML = '';
    ["Mic Toss", "Pizza Wheel", "Happy Jam", "Bash"].forEach(move => {
        const btn = document.createElement('button');
        btn.className = 'btn'; btn.innerText = move;
        btn.onclick = () => performMove(move);
        actions.appendChild(btn);
    });
}

function performMove(move) {
    if (move === "Happy Jam") {
        state.battleParty.forEach(p => p.hp = Math.min(100, p.hp + 20));
        showMsg("Healed Party!");
    } else {
        state.currentEnemy.hp -= 30;
        showMsg(`${move} hits for 30!`);
    }

    if (state.currentEnemy.hp <= 0) {
        endBattle(true);
    } else {
        setTimeout(enemyAttack, 600);
    }
    updateBattleUI();
}

function enemyAttack() {
    if (state.view !== 'BATTLE') return;
    const target = state.battleParty[Math.floor(Math.random()*state.battleParty.length)];
    target.hp -= 15;
    if (state.battleParty.every(p => p.hp <= 0)) endBattle(false);
    updateBattleUI();
}

function endBattle(win) {
    document.getElementById('battle-ui').style.display = 'none';
    state.view = 'OVERWORLD';
    
    if (win) {
        if (state.challenger) {
            state.unlocked.push(state.challenger.rosterId);
            showMsg(`${state.challenger.name} Joined Your Roster!`);
        } else {
            state.tokens += 40;
            document.getElementById('token-val').innerText = state.tokens;
            // 30% Challenger Chance
            if (Math.random() < 0.3 && state.unlocked.length < 48) {
                spawnChallenger();
            }
        }
    }
}

function spawnChallenger() {
    const locked = ROSTER.map((_, i) => i).filter(id => !state.unlocked.includes(id));
    const nextId = locked[Math.floor(Math.random()*locked.length)];
    const data = ROSTER[nextId];
    showMsg("A NEW CHALLENGER APPEARED!");
    setTimeout(() => {
        startBattle({ name: data.name, hp: 200, rosterId: nextId, ...data }, true);
    }, 1500);
}

/** * MAIN LOOP 
 */
function loop() {
    ctx.clearRect(0, 0, 800, 600);

    if (state.view === 'OVERWORLD') {
        // Render World
        if (state.inGlitch) {
            ctx.fillStyle = '#010'; ctx.fillRect(0,0,800,600);
            ctx.strokeStyle = '#040';
            for(let i=0; i<800; i+=40) ctx.strokeRect(i,0,1,600);
        } else {
            ctx.fillStyle = '#131'; ctx.fillRect(0, 480, 800, 120);
        }

        // Movement
        if (state.keys['ArrowLeft']) state.playerPos.x -= 5;
        if (state.keys['ArrowRight']) state.playerPos.x += 5;

        // Glitch Trigger (Collision with hidden spots)
        if (Math.abs(state.playerPos.x - 400) < 20) {
            ctx.fillStyle = "#fff"; ctx.fillText("?? GLITCH ??", 380, 440);
            if (state.keys['ArrowUp']) state.inGlitch = !state.inGlitch;
        }

        drawAnimatronic(state.playerPos.x, state.playerPos.y, ROSTER[state.party[0]]);

        // Random Encounter Logic
        if (Math.random() < 0.005) {
            startBattle({ name: "Endo", hp: 100, col: "#777", type: "bear", eyes: "#fff" });
        }

    } else if (state.view === 'BATTLE') {
        // Render Battle Stage
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,800,600);
        drawAnimatronic(500, 200, state.currentEnemy, 2.5);
        state.battleParty.forEach((p, i) => drawAnimatronic(150, 80 + (i*100), p, 1.2));
    }

    requestAnimationFrame(loop);
}

// Input Handlers
window.addEventListener('keydown', e => state.keys[e.code] = true);
window.addEventListener('keyup', e => state.keys[e.code] = false);

// Init
loop();
</script>
</body>
</html>
